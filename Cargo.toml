[package]
name = "crmux"
version = "0.1.0"
edition = "2024"
authors = ["maedana"]
description = "A tmux-based Claude Code session aggregator and manager"
license = "MIT"

[[bin]]
name = "crmux"
path = "src/main.rs"

[dependencies]
ratatui = "0.28"
crossterm = "0.28"
clap = { version = "4.0", features = ["derive"] }
tmux-claude-state = "0.1.1"

[dev-dependencies]

[lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
